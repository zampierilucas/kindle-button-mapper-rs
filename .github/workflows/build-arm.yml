name: Build ARM Binary

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build ARMv7 musl
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Rust target
        run: rustup target add armv7-unknown-linux-musleabihf

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: armv7-musl

      - name: Compute build SHA
        id: sha
        env:
          FULL_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          SHORT=$(git rev-parse --short "$FULL_SHA")
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"

      - name: Build release
        env:
          BUILD_SHA: ${{ steps.sha.outputs.short }}
        run: cargo build --release --target armv7-unknown-linux-musleabihf

      - name: Assemble output tree
        run: |
          mkdir -p output/scripts output/illusion/MapperManager
          cp target/armv7-unknown-linux-musleabihf/release/kindle-button-mapper output/
          cp kindle-button-mapper.init output/
          cp scripts/koreader.sh scripts/key.sh output/scripts/
          cp illusion/MapperManager.sh illusion/install-waf-app.sh output/illusion/
          cp illusion/MapperManager/config.xml illusion/MapperManager/index.html \
             illusion/MapperManager/style.css illusion/MapperManager/script.js \
             output/illusion/MapperManager/
          chmod +x output/kindle-button-mapper output/kindle-button-mapper.init \
                   output/scripts/*.sh output/illusion/*.sh

      - name: Show contents
        run: |
          echo "=== Top level ==="
          ls -lh output/
          echo "=== File types ==="
          file output/kindle-button-mapper
          echo "=== Version ==="
          file output/kindle-button-mapper | grep -q ARM && echo "ARM binary OK" || (echo "::error::Not an ARM binary"; exit 1)

      - name: Create tarball
        run: |
          tar -czvf "kindle-button-mapper-armv7.tar.gz" -C output .
          ls -lh *.tar.gz

      - name: Validate tarball manifest
        run: |
          echo "Checking tarball contains all expected files..."
          MISSING=0
          for f in \
            kindle-button-mapper \
            kindle-button-mapper.init \
            scripts/koreader.sh \
            scripts/key.sh \
            illusion/MapperManager.sh \
            illusion/install-waf-app.sh \
            illusion/MapperManager/config.xml \
            illusion/MapperManager/index.html \
            illusion/MapperManager/style.css \
            illusion/MapperManager/script.js; do
            if ! tar -tzf kindle-button-mapper-armv7.tar.gz "./$f" >/dev/null 2>&1; then
              echo "MISSING: $f"
              MISSING=1
            else
              echo "OK: $f"
            fi
          done
          if [ "$MISSING" -eq 1 ]; then
            echo "::error::Tarball is missing required files"
            exit 1
          fi
          echo "All required files present."

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: kindle-button-mapper-armv7
          path: kindle-button-mapper-armv7.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: kindle-button-mapper-armv7.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
